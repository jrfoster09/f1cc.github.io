<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drivers — F1CC Wiki</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .search-bar {
      width: 100%; background: var(--navy-light); border: 1px solid var(--blue-border);
      border-radius: var(--radius); padding: 10px 14px; color: var(--text-primary);
      font-family: var(--font-body); font-size: 14px; outline: none; transition: border-color 0.15s;
    }
    .search-bar:focus { border-color: var(--blue-accent); }
    .search-bar::placeholder { color: var(--text-muted); }
    .driver-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px,1fr)); gap: 12px; }

    .driver-tile {
      background: var(--navy-light); border: 1px solid var(--blue-border);
      border-radius: var(--radius-lg); padding: 1rem;
      text-decoration: none; display: block; transition: all 0.15s;
    }
    .driver-tile:hover { border-color: var(--blue-accent); transform: translateY(-2px); background: rgba(59,141,224,0.06); }

    /* Numara ve Bayrak Alanı */
    .driver-tile-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .driver-tile-number { font-family: var(--font-display); font-size: 18px; font-weight: 800; color: var(--text-muted); }
    .driver-tile-flag { font-size: 24px; line-height: 1; display: flex; }

    .driver-tile-name { font-family: var(--font-display); font-size: 17px; font-weight: 700; color: var(--text-primary); margin-bottom: 4px; line-height: 1.2; }
    .driver-tile-meta { font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; display: flex; align-items: center; flex-wrap: wrap; gap: 6px; }

    /* F1 ve F2 Etiket Stilleri */
    .series-tag { font-family: var(--font-display); font-size: 10px; font-weight: 800; padding: 2px 5px; border-radius: 4px; }
    .tag-f1 { background-color: #E8002D; color: white; }
    .tag-f2 { background-color: #0090D0; color: white; }

    .driver-tile-stats { display: flex; gap: 12px; font-size: 12px; color: var(--text-muted); border-top: 1px solid rgba(59,141,224,0.1); padding-top: 8px; margin-top: 8px; }
    .driver-tile-stat { display: flex; flex-direction: column; align-items: center; }
    .driver-tile-stat .val { font-family: var(--font-display); font-size: 15px; font-weight: 700; color: var(--text-primary); }
    .driver-tile-stat .lbl { font-size: 10px; color: var(--text-muted); }
  </style>
  <script src="https://unpkg.com/twemoji@14.0.2/dist/twemoji.min.js" crossorigin="anonymous"></script>
</head>
<body>

<nav id="nav">
  <a class="nav-logo" href="../index.html"><div class="nav-logo-pip"></div>F1CC WIKI</a>
  <ul class="nav-links">
    <li><a href="../index.html">Home</a></li>
    <li><a href="seasons.html">Seasons</a></li>
    <li><a href="drivers.html" class="active">Drivers</a></li>
    <li><a href="teams.html">Teams</a></li>
    <li><a href="records.html">Records</a></li>
  </ul>
</nav>

<div class="hero-strip">
  <div class="hero-eyebrow">F1CC Database</div>
  <h1 class="hero-title">Drivers</h1>
  <p class="hero-sub">Every driver who has competed in the F1 Community Career. Click a driver for their full profile and career stats.</p>
</div>

<div class="page-container">
  <div class="section-header mb-2">
    <span class="section-title" id="driver-count">All Drivers</span>

    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
      <select id="series-filter" style="background:var(--navy-light);border:1px solid var(--blue-border);color:var(--text-secondary);padding:5px 10px;border-radius:var(--radius);font-size:13px;outline:none">
        <option value="">All Series</option>
        <option value="f1">Formula 1</option>
        <option value="f2">Formula 2</option>
      </select>

      <select id="sort-filter" style="background:var(--navy-light);border:1px solid var(--blue-border);color:var(--text-secondary);padding:5px 10px;border-radius:var(--radius);font-size:13px;outline:none">
        <option value="name">Name (A-Z)</option>
        <option value="points">Points (High-Low)</option>
        <option value="wins">Wins (High-Low)</option>
        <option value="podiums">Podiums (High-Low)</option>
      </select>

      <select id="season-filter" style="background:var(--navy-light);border:1px solid var(--blue-border);color:var(--text-secondary);padding:5px 10px;border-radius:var(--radius);font-size:13px;outline:none">
        <option value="">All Seasons</option>
      </select>
    </div>
  </div>
  <input class="search-bar mb-2" id="search" type="text" placeholder="Search drivers…">
  <div class="driver-grid" id="driver-grid"></div>
</div>

<footer>
  <p>F1CC Wiki · <a href="../index.html">Home</a></p>
</footer>

<script src="../js/core.js"></script>
<script>
  let ALL_DRIVERS = [];

  function teamStyle(teamId) {
    const t = DB.teams[teamId]; if (!t) return '';
    const h=t.color; const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);
    return `background:rgba(${r},${g},${b},0.18);color:${h};border-color:rgba(${r},${g},${b},0.4)`;
  }

  function render(drivers) {
    const grid = document.getElementById('driver-grid');
    document.getElementById('driver-count').textContent = `${drivers.length} Driver${drivers.length!==1?'s':''}`;

    if (drivers.length === 0) {
      grid.innerHTML = '<p style="color:var(--text-muted)">No drivers found.</p>';
      return;
    }

    grid.innerHTML = drivers.map(([id, d]) => {
      // Sezonları en yeniden en eskiye sırala (2026 > 2025)
      const seasons = Object.keys(d.seasons||{}).sort((a,b)=>b.localeCompare(a));
      const latestSeasonKey = seasons[0];
      const latestTeamId = d.seasons[latestSeasonKey]?.team;
      const latestTeam = DB.teams[latestTeamId];

      const teamSeries = latestTeam?.series || 'f1';
      const seriesLabel = teamSeries === 'f2' ? 'F2' : 'F1';
      const seriesClass = teamSeries === 'f2' ? 'tag-f2' : 'tag-f1';
      const displayNum = d.number ? `#${d.number}` : '#—';

      // Şampiyonluk Yıldızlarını Hesaplama
      let f1Stars = '';
      let f2Stars = '';
      Object.values(DB.seasons).forEach(s => {
        if (s.champion_driver === id) {
          if ((s.series || 'f1') === 'f1') {
            f1Stars += '<span style="color: var(--gold); margin-left: 4px;" title="F1 Champion">⭐</span>';
          } else if (s.series === 'f2') {
            f2Stars += '<span style="color: #0090D0; margin-left: 4px; font-size:14px;" title="F2 Champion">★</span>';
          }
        }
      });
      const allStars = f1Stars + f2Stars;

      // YENİ: Free Agent, Retired ve Team Principal Mantığı
      const has2026Seat = d.seasons['2026'] || d.seasons['2026_f2'];
      const isRetired = d.status === 'retired';
      const isPrincipal = d.status === 'principal'; // Patronlar için yeni kontrol

      let statusPill = '';
      if (isPrincipal) {
        // Takım Patronları için klas ve prestijli bir altın stili
        statusPill = `<span class="team-pill" style="background:rgba(200, 168, 64, 0.15);color:var(--gold);border-color:rgba(200, 168, 64, 0.5)">Team Principal 👔</span>`;
      } else if (isRetired) {
        // Emekliler için koyu gri / soluk stil
        statusPill = `<span class="team-pill" style="background:rgba(255,255,255,0.05);color:#888;border-color:#444">Retired</span>`;
      } else if (!has2026Seat) {
        // Free Agent'lar için gri/beyaz stil
        statusPill = `<span class="team-pill" style="background:rgba(255,255,255,0.1);color:#ccc;border-color:#666">Free Agent</span>`;
      } else if (latestTeam) {
        // Aktif sürücüler için normal takım stili
        statusPill = `<span class="team-pill" style="${teamStyle(latestTeamId)}; display: inline-flex; align-items: center; gap: 6px;">
            <img src="../assets/teams/${latestTeamId}.svg" style="height: 12px; width: auto;" onerror="this.style.display='none'">
            ${latestTeam.short}
          </span>`;
      }

      return `<a class="driver-tile" href="driver.html?id=${id}">
      <div class="driver-tile-header">
        <div class="driver-tile-number">${displayNum}</div>
        <div class="driver-tile-flag">${d.flag_emoji}</div>
      </div>
      <div class="driver-tile-name">${d.name}${allStars}</div>
      <div class="driver-tile-meta">
        ${(isRetired || isPrincipal) ? '' : `<span class="series-tag ${seriesClass}">${seriesLabel}</span>`}
        ${statusPill}
        <span style="color:var(--text-muted)">${seasons.length} season${seasons.length!==1?'s':''}</span>
      </div>
      <div class="driver-tile-stats">
        <div class="driver-tile-stat"><div class="val" style="color:var(--gold)">${d.stats.wins}</div><div class="lbl">Wins</div></div>
        <div class="driver-tile-stat"><div class="val">${d.stats.podiums}</div><div class="lbl">Podiums</div></div>
        <div class="driver-tile-stat"><div class="val" style="color:var(--blue-accent)">${d.stats.points}</div><div class="lbl">Points</div></div>
      </div>
    </a>`;
    }).join('');

    setTimeout(() => { if(window.twemoji) twemoji.parse(grid, {folder:'svg',ext:'.svg'}); }, 50);
  }

  function filter() {
    const q = document.getElementById('search').value.toLowerCase();
    const sy = document.getElementById('season-filter').value;
    const series = document.getElementById('series-filter').value;
    const sortType = document.getElementById('sort-filter').value;

    let filtered = ALL_DRIVERS.filter(([id, d]) => {
      const seasons = Object.keys(d.seasons || {}).sort((a,b) => b.localeCompare(a));
      const latestSeasonKey = seasons[0];

      const latestTeamId = d.seasons[latestSeasonKey]?.team;
      const teamSeries = DB.teams[latestTeamId]?.series || 'f1';

      const matchName = d.name.toLowerCase().includes(q);
      const matchSeason = !sy || seasons.includes(sy);
      const matchSeries = !series || teamSeries === series;

      return matchName && matchSeason && matchSeries;
    });

    filtered.sort((a, b) => {
      const driverA = a[1];
      const driverB = b[1];

      if (sortType === 'name') {
        return driverA.name.localeCompare(driverB.name);
      } else if (sortType === 'points') {
        return driverB.stats.points - driverA.stats.points;
      } else if (sortType === 'wins') {
        return driverB.stats.wins - driverA.stats.wins;
      } else if (sortType === 'podiums') {
        return driverB.stats.podiums - driverA.stats.podiums;
      }
    });

    render(filtered);
  }

  async function init() {
    DB = await fetch('../data/db.json').then(r=>r.json());

    ALL_DRIVERS = Object.entries(DB.drivers).filter(([id]) => !id.endsWith('_2024'));
    ALL_DRIVERS.forEach(([id, d]) => {
      d.stats = { wins: 0, podiums: 0, points: 0 };
      Object.values(DB.seasons).forEach(s => {
        const row = (s.driver_standings||[]).find(r => r.driver === id);
        if (row) {
          d.stats.wins += row.wins || 0;
          d.stats.podiums += row.podiums || 0;
          d.stats.points += row.points || 0;
        }
      });
    });

    ALL_DRIVERS.sort((a,b) => a[1].name.localeCompare(b[1].name));

    const sel = document.getElementById('season-filter');
    // Dropdown'a yılların temiz halini (2026_f2 yerine 2026 yazarak) koyalım
    const uniqueYears = [...new Set(Object.keys(DB.seasons).map(y => y.split('_')[0]))].sort((a,b) => b-a);
    uniqueYears.forEach(y => {
      const opt = document.createElement('option');
      opt.value = y; opt.textContent = y;
      sel.appendChild(opt);
    });

    document.getElementById('search').addEventListener('input', filter);
    document.getElementById('season-filter').addEventListener('change', filter);
    document.getElementById('sort-filter').addEventListener('change', filter);
    document.getElementById('series-filter').addEventListener('change', filter);

    render(ALL_DRIVERS);
  }
  init();

  setTimeout(() => { if(window.twemoji) twemoji.parse(document.body, {folder:'svg', ext:'.svg'}); }, 500);
</script>
</body>
</html>

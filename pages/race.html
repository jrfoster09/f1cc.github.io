<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Race Result — F1CC Wiki</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .race-summary-box {
      background: var(--navy-light); border-left: 3px solid var(--blue-accent);
      border-radius: 0 var(--radius) var(--radius) 0;
      padding: 1rem 1.25rem; margin-bottom: 1.5rem;
      font-size: 14px; color: var(--text-secondary); line-height: 1.7;
    }
    .fl-badge { display: inline-block; background: rgba(160,40,200,0.2); color: #c070e8;
      border: 1px solid rgba(160,40,200,0.4); font-size: 10px; font-weight: 600;
      padding: 1px 6px; border-radius: 4px; margin-left: 6px; vertical-align: middle; }
    .vod-btn {
      display: inline-flex; align-items: center; gap: 8px;
      background: #ff0000; color: #fff; border: none;
      font-family: var(--font-display); font-size: 13px; font-weight: 600;
      padding: 8px 18px; border-radius: var(--radius); text-decoration: none;
      transition: opacity 0.15s;
    }
    .vod-btn:hover { opacity: 0.85; }
    .result-grid { display: grid; grid-template-columns: 1fr 300px; gap: 1.5rem; }
    .stat-mini { display: flex; flex-direction: column; gap: 10px; }
    .stat-mini-row { background: var(--navy-light); border: 1px solid var(--blue-border); border-radius: var(--radius); padding: 10px 14px; }
    .stat-mini-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
    .stat-mini-val { font-family: var(--font-display); font-size: 17px; font-weight: 700; color: var(--text-primary); }
    .stat-mini-sub { font-size: 12px; color: var(--text-secondary); }
    @media (max-width: 700px) { .result-grid { grid-template-columns: 1fr; } }
  </style>
<script src="https://unpkg.com/twemoji@14.0.2/dist/twemoji.min.js" crossorigin="anonymous"></script>
</head>
<body>

<nav id="nav">
  <a class="nav-logo" href="../index.html"><div class="nav-logo-pip"></div>F1CC WIKI</a>
  <ul class="nav-links">
    <li><a href="../index.html">Home</a></li>
    <li><a href="seasons.html" class="active">Seasons</a></li>
    <li><a href="drivers.html">Drivers</a></li>
    <li><a href="teams.html">Teams</a></li>
    <li><a href="records.html">Records</a></li>
  </ul>
</nav>

<div id="race-hero" class="hero-strip">
  <div class="hero-eyebrow" id="hero-eye">Race Result</div>
  <h1 class="hero-title" id="hero-title">Loading…</h1>
  <p class="hero-sub" id="hero-sub"></p>
</div>

<div class="page-container">
  <a class="back-link" id="back-link" href="seasons.html">← Season Calendar</a>

  <div id="content">
    <div style="color:var(--text-muted)">Loading race data…</div>
  </div>
</div>

<footer>
  <p>F1CC Wiki · <a href="../index.html">Home</a></p>
</footer>

<script src="../js/core.js"></script>
<script>
async function init() {
  DB = await fetch('../data/db.json').then(r=>r.json());
  const params = new URLSearchParams(window.location.search);
  const raceId = params.get('id');
  const season = params.get('season') || DB.meta.currentSeason;

  document.getElementById('back-link').href = `season.html?year=${season}`;

  const raceData = await fetch(`../data/races_${season}.json`).then(r=>r.json()).catch(()=>null);
  if (!raceData) { document.getElementById('content').innerHTML = '<p style="color:var(--text-muted)">Race data not found.</p>'; return; }

  const race = raceData.races.find(r => r.id === raceId);
  if (!race) { document.getElementById('content').innerHTML = '<p style="color:var(--text-muted)">Race not found.</p>'; return; }

  // Hero
  document.getElementById('hero-eye').textContent = `Season ${season} · Round ${race.round}`;
  document.getElementById('hero-title').textContent = `${race.flag||'🏁'} ${race.name}`;
  document.getElementById('hero-sub').textContent = `${race.circuit} · ${race.date}`;
  document.title = `${race.name} ${season} — F1CC Wiki`;

  const teamStyle = (teamId) => {
    const t = DB.teams[teamId]; if (!t) return '';
    const h=t.color; const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);
    return `background:rgba(${r},${g},${b},0.18);color:${h};border-color:rgba(${r},${g},${b},0.4)`;
  };

  // Build content
  let html = '';

  // Race summary
  if (race.summary) {
    html += `<div class="race-summary-box">${race.summary}</div>`;
  }

  // VOD link
  if (race.vod_url) {
    html += `<div style="margin-bottom:1.5rem"><a class="vod-btn" href="${race.vod_url}" target="_blank">▶ Watch Race VOD</a></div>`;
  }

  if (race.status !== 'complete' || !race.results || race.results.length === 0) {
    html += '<div class="card"><p style="color:var(--text-muted)">Results not yet available.</p></div>';
    document.getElementById('content').innerHTML = html;
    return;
  }

  const winner = DB.drivers[race.results[0].driver];
  const flRow = race.results.find(r => r.fastest_lap);
  const fl = flRow ? DB.drivers[flRow.driver] : null;

  // Podium cards
  const top3 = race.results.slice(0,3);
  html += `<div class="podium-row mb-3">`;
  top3.forEach((r,i) => {
    const d = DB.drivers[r.driver];
    const t = DB.teams[r.team];
    const cls = ['p1','p2','p3'][i];
    const label = ['🥇 Winner','🥈 Runner-up','🥉 Third'][i];
    html += `<div class="podium-card ${cls}">
      <div class="podium-pos">${label}</div>
      <div class="podium-driver">${d?d.flag_emoji+' '+d.name:r.driver}</div>
      <div class="podium-team">${t?t.name:r.team}</div>
      <div style="margin-top:6px;font-family:var(--font-display);font-size:13px;color:var(--text-muted)">${r.points ?? '—'} pts</div>
    </div>`;
  });
  html += `</div>`;

  // Main result grid
  html += `<div class="result-grid">`;

  // Full results table
  html += `<div>
    <div class="section-header mb-1"><span class="section-title">Full Result</span></div>
    <table class="standings-table">
      <thead><tr>
        <th style="width:40px">Pos</th><th>Driver</th><th>Team</th>
        <th>Quali</th><th>Points</th>
      </tr></thead>
      <tbody>`;

  race.results.forEach((r, i) => {
    const d = DB.drivers[r.driver];
    const t = DB.teams[r.team];
    const cls = i===0?'p1':i===1?'p2':i===2?'p3':'';
    html += `<tr class="${i===0?'leader':''}">
      <td><div class="pos-badge ${cls}">${r.pos}</div></td>
      <td><div style="display:flex;align-items:center;gap:6px">
        <span>${d?d.flag_emoji:''}</span>
        <a class="driver-name-link" href="driver.html?id=${r.driver}">${d?d.name:r.driver}</a>
        ${r.fastest_lap?'<span class="fl-badge">FL</span>':''}
      </div></td>
      <td><span class="team-pill" style="${teamStyle(r.team)}">${t?t.short:r.team}</span></td>
      <td style="color:var(--text-muted);font-family:var(--font-mono);font-size:12px">${r.quali_pos ? 'P'+r.quali_pos : '—'}</td>
      <td class="pts-cell">${r.points ?? '—'}</td>
    </tr>`;
  });

  html += `</tbody></table></div>`;

  // Race facts sidebar
  html += `<div class="stat-mini">
    <div class="stat-mini-row">
      <div class="stat-mini-label">Winner</div>
      <div class="stat-mini-val">${winner?winner.name:'—'}</div>
      <div class="stat-mini-sub">${DB.teams[race.results[0].team]?.name||'—'}</div>
    </div>
    <div class="stat-mini-row">
      <div class="stat-mini-label">Fastest Lap</div>
      <div class="stat-mini-val">${fl?fl.name:'—'}</div>
      <div class="stat-mini-sub">${flRow?DB.teams[flRow.team]?.short||'—':'—'}</div>
    </div>
    <div class="stat-mini-row">
      <div class="stat-mini-label">Pole Position</div>
      <div class="stat-mini-val">${(()=>{const p=race.results.find(r=>r.quali_pos===1);const d=p?DB.drivers[p.driver]:null;return d?d.name:'—';})()}</div>
    </div>
    <div class="stat-mini-row">
      <div class="stat-mini-label">Circuit</div>
      <div class="stat-mini-val" style="font-size:14px">${race.circuit}</div>
    </div>
    <div class="stat-mini-row">
      <div class="stat-mini-label">Date</div>
      <div class="stat-mini-val" style="font-size:14px">${race.date}</div>
    </div>
  </div>`;

  html += `</div>`;
  document.getElementById('content').innerHTML = html;
}
init();
// Render flag emojis as images for cross-platform support
setTimeout(() => { if(window.twemoji) twemoji.parse(document.body, {folder:'svg', ext:'.svg'}); }, 500);
</script>
</body>
</html>

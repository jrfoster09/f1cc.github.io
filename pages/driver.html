<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Driver — F1CC Wiki</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .driver-header { display: flex; align-items: flex-start; gap: 1.5rem; margin-bottom: 1.5rem; }
    .driver-avatar-lg {
      width: 80px; height: 80px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 32px; border: 3px solid var(--blue-border);
      background: var(--navy-light);
    }
    .driver-header-info h2 { font-family: var(--font-display); font-size: 28px; font-weight: 700; color: var(--text-primary); }
    .driver-header-meta { color: var(--text-secondary); font-size: 14px; margin-top: 4px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .career-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px,1fr)); gap: 10px; margin-bottom: 1.5rem; }
    .season-history { display: flex; flex-direction: column; gap: 8px; }
    .season-row {
      display: flex; align-items: center; gap: 12px;
      background: var(--navy-light); border: 1px solid var(--blue-border);
      border-radius: var(--radius); padding: 10px 14px;
    }
    .season-year { font-family: var(--font-display); font-size: 16px; font-weight: 700; color: var(--text-primary); width: 50px; flex-shrink: 0; }
    .season-row-info { flex: 1; }
    .season-champ-pos { font-family: var(--font-display); font-size: 14px; font-weight: 700; }
    .result-row { display: flex; align-items: center; gap: 10px; padding: 7px 0; border-bottom: 1px solid rgba(59,141,224,0.07); font-size: 13px; }
    .result-row:last-child { border-bottom: none; }
  </style>
<script src="https://unpkg.com/twemoji@14.0.2/dist/twemoji.min.js" crossorigin="anonymous"></script>
</head>
<body>

<nav id="nav">
  <a class="nav-logo" href="../index.html"><div class="nav-logo-pip"></div>F1CC WIKI</a>
  <ul class="nav-links">
    <li><a href="../index.html">Home</a></li>
    <li><a href="seasons.html">Seasons</a></li>
    <li><a href="drivers.html" class="active">Drivers</a></li>
    <li><a href="teams.html">Teams</a></li>
    <li><a href="records.html">Records</a></li>
  </ul>
</nav>

<div class="hero-strip" id="driver-hero">
  <div class="hero-eyebrow" id="hero-eye">Driver Profile</div>
  <h1 class="hero-title" id="hero-title">Loading…</h1>
  <p class="hero-sub" id="hero-sub"></p>
</div>

<div class="page-container">
  <a class="back-link" href="drivers.html">← All Drivers</a>
  <div id="content"><div style="color:var(--text-muted)">Loading driver profile…</div></div>
</div>

<footer>
  <p>F1CC Wiki · <a href="../index.html">Home</a></p>
</footer>

<script src="../js/core.js"></script>
<script>
async function init() {
  DB = await fetch('../data/db.json').then(r=>r.json());
  const params = new URLSearchParams(window.location.search);
  const driverId = params.get('id');

  const driver = DB.drivers[driverId];
  if (!driver) {
    document.getElementById('content').innerHTML = '<p style="color:var(--text-muted)">Driver not found.</p>';
    return;
  }

  document.title = `${driver.name} — F1CC Wiki`;
  document.getElementById('hero-eye').textContent = `Driver Profile`;
  document.getElementById('hero-title').textContent = driver.name;

  const seasons = Object.keys(driver.seasons || {}).sort((a,b) => b-a);
  const currentTeamId = driver.seasons[seasons[0]]?.team;
  const currentTeam = DB.teams[currentTeamId];
  document.getElementById('hero-sub').textContent = currentTeam ? `${currentTeam.name} · Active since ${seasons[seasons.length-1]}` : '';

  // Compute live career stats from all race files
  let careerWins = 0, careerPodiums = 0, careerPoints = 0, careerRaces = 0,
      careerPoles = 0, careerFL = 0, careerBestResult = 99;
  const seasonResults = {}; // year -> {pos, pts, wins, podiums, races}

  // Pull from db season standings first
  for (const [year, seasonData] of Object.entries(DB.seasons)) {
    const row = (seasonData.driver_standings || []).find(s => s.driver === driverId);
    if (row) {
      seasonResults[year] = {
        champPos: row.pos, points: row.points, wins: row.wins || 0,
        podiums: row.podiums || 0, races: row.races || 0
      };
    }
  }

  // Then enrich with individual race files
  const allSeasonYears = Object.keys(DB.seasons);
  for (const year of allSeasonYears) {
    try {
      const raceResp = await fetch(`../data/races_${year}.json`);
      if (!raceResp.ok) continue;
      const raceData = await raceResp.json();
      let w=0,p=0,pts=0,races=0,poles=0,fl=0;
      for (const race of raceData.races) {
        if (race.status !== 'complete') continue;
        const myResult = race.results?.find(r => r.driver === driverId);
        if (!myResult) continue;
        races++;
        pts += myResult.points || 0;
        if (myResult.pos === 1) w++;
        if (myResult.pos <= 3) p++;
        if (myResult.quali_pos === 1) poles++;
        if (myResult.fastest_lap) fl++;
        if (myResult.pos < careerBestResult) careerBestResult = myResult.pos;
      }
      careerWins += w; careerPodiums += p; careerPoints += pts;
      careerRaces += races; careerPoles += poles; careerFL += fl;
    } catch(e) {}
  }

  const teamStyle = (teamId) => {
    const t = DB.teams[teamId]; if (!t) return '';
    const h=t.color; const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);
    return `background:rgba(${r},${g},${b},0.18);color:${h};border-color:rgba(${r},${g},${b},0.4)`;
  };

  let html = '';

  // Driver header
  html += `<div class="driver-header">
    <div class="driver-avatar-lg">
      ${driver.photo 
        ? `<img src="${driver.photo}" alt="${driver.name}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">` 
        : driver.flag_emoji}
    </div>
    <div class="driver-header-info">
      <h2>${driver.name}</h2>
      <div class="driver-header-meta">
        <span>${driver.flag_emoji}</span>`;
  if (currentTeam) html += `<span class="team-pill" style="${teamStyle(currentTeamId)}">${currentTeam.name}</span>`;
  html += `<span style="color:var(--text-muted)">Active ${seasons[seasons.length-1]}–${seasons[0]}</span>
      </div>
      ${driver.bio ? `<p style="margin-top:10px;font-size:14px;color:var(--text-secondary);max-width:540px;line-height:1.6">${driver.bio}</p>` : ''}
    </div>
  </div>`;

  // Career stats (live)
  html += `<div class="section-header mb-1"><span class="section-title">Career Statistics <span style="font-size:10px;color:var(--blue-accent);letter-spacing:0;text-transform:none;font-weight:400">(live · updates with each race)</span></span></div>
  <div class="career-grid">
    <div class="stat-card"><div class="s-label">Races</div><div class="s-val">${careerRaces}</div></div>
    <div class="stat-card"><div class="s-label">Wins</div><div class="s-val" style="color:var(--gold)">${careerWins}</div></div>
    <div class="stat-card"><div class="s-label">Podiums</div><div class="s-val">${careerPodiums}</div></div>
    <div class="stat-card"><div class="s-label">Points</div><div class="s-val" style="color:var(--blue-accent)">${careerPoints}</div></div>
    <div class="stat-card"><div class="s-label">Poles</div><div class="s-val">${careerPoles}</div></div>
    <div class="stat-card"><div class="s-label">Fastest Laps</div><div class="s-val">${careerFL}</div></div>
    <div class="stat-card"><div class="s-label">Best Result</div><div class="s-val">${careerBestResult < 99 ? 'P'+careerBestResult : '—'}</div></div>
    <div class="stat-card"><div class="s-label">Seasons</div><div class="s-val">${seasons.length}</div></div>
  </div>
  <hr class="divider">`;

  // Season-by-season history
  html += `<div class="section-header mb-1"><span class="section-title">Season History</span></div>
  <div class="season-history">`;

  seasons.forEach(year => {
    const dSeason = driver.seasons[year];
    const champData = seasonResults[year];
    const team = DB.teams[dSeason?.team];
    const champPos = champData?.champPos;
    const champPosLabel = champPos === 1 ? '🏆 Champion' : champPos ? `P${champPos}` : '—';
    const champColor = champPos === 1 ? 'var(--gold)' : champPos <= 3 ? 'var(--silver)' : 'var(--text-primary)';

    html += `<div class="season-row">
      <div class="season-year">${year}</div>
      <div class="season-row-info">
        ${team ? `<span class="team-pill" style="${teamStyle(dSeason.team)}">${team.name}</span>` : ''}
        <div style="margin-top:6px;font-size:12px;color:var(--text-secondary)">
          #${dSeason?.number || '—'} ·
          ${champData ? `${champData.races} races · ${champData.wins}W · ${champData.podiums}P · ${champData.points}pts` : 'Data pending'}
        </div>
      </div>
      <div class="season-champ-pos" style="color:${champColor}">${champPosLabel}</div>
      <a href="season.html?year=${year}" class="btn btn-ghost" style="font-size:11px;padding:4px 10px;margin-left:8px">Season →</a>
    </div>`;
  });

  html += `</div>`;

  document.getElementById('content').innerHTML = html;
  initTabs();
}
init();
// Render flag emojis as images for cross-platform support
setTimeout(() => { if(window.twemoji) twemoji.parse(document.body, {folder:'svg', ext:'.svg'}); }, 500);
</script>
</body>
</html>

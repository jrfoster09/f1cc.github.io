<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>F1CC Season — Wiki</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .race-list { display: flex; flex-direction: column; gap: 6px; }
    .race-row {
      display: flex; align-items: center; gap: 12px;
      background: var(--navy-light); border: 1px solid var(--blue-border);
      border-radius: var(--radius); padding: 10px 14px;
      text-decoration: none; transition: all 0.15s; cursor: pointer;
    }
    .race-row:hover { border-color: var(--blue-accent); background: rgba(59,141,224,0.07); }
    .race-row-round { font-family: var(--font-display); font-size: 12px; font-weight: 600; color: var(--text-muted); width: 28px; flex-shrink: 0; }
    .race-row-flag { font-size: 18px; flex-shrink: 0; }
    .race-row-info { flex: 1; }
    .race-row-name { font-family: var(--font-display); font-size: 15px; font-weight: 700; color: var(--text-primary); }
    .race-row-circuit { font-size: 12px; color: var(--text-secondary); }
    .race-row-winner { font-size: 12px; color: var(--text-secondary); flex-shrink: 0; text-align: right; }
    .race-row-winner .win-name { color: var(--text-primary); font-weight: 500; }
  </style>
<script src="https://unpkg.com/twemoji@14.0.2/dist/twemoji.min.js" crossorigin="anonymous"></script>
</head>
<body>

<nav id="nav">
  <a class="nav-logo" href="../index.html"><div class="nav-logo-pip"></div>F1CC WIKI</a>
  <ul class="nav-links">
    <li><a href="../index.html">Home</a></li>
    <li><a href="seasons.html" data-page="seasons" class="active">Seasons</a></li>
    <li><a href="drivers.html" data-page="drivers">Drivers</a></li>
    <li><a href="teams.html" data-page="teams">Teams</a></li>
    <li><a href="records.html" data-page="records">Records</a></li>
  </ul>
</nav>

<div id="season-hero" class="hero-strip">
  <div class="hero-eyebrow" id="hero-eye">Season</div>
  <h1 class="hero-title" id="hero-title">Loading…</h1>
  <p class="hero-sub" id="hero-sub"></p>
  <div class="hero-stats" id="hero-stats"></div>
</div>

<div class="page-container">
  <a class="back-link" href="seasons.html">← All Seasons</a>

  <!-- Season selector -->
  <div class="section-header mb-2">
    <span class="section-title">Season</span>
    <div class="season-selector" id="season-selector"></div>
  </div>

  <div class="tabs">
    <button class="tab-btn" data-tab="drivers" data-tab-group="main">Drivers Championship</button>
    <button class="tab-btn" data-tab="constructors" data-tab-group="main">Constructors Championship</button>
    <button class="tab-btn" data-tab="races" data-tab-group="main">Race Calendar</button>
  </div>

  <div class="tab-panel" data-tab="drivers" data-tab-group="main">
    <div id="driver-standings-table"></div>
  </div>

  <div class="tab-panel" data-tab="constructors" data-tab-group="main">
    <div id="constructor-standings-table"></div>
  </div>

  <div class="tab-panel" data-tab="races" data-tab-group="main">
    <div class="race-list" id="race-calendar"></div>
  </div>
</div>

<footer>
  <p>F1CC Wiki · <a href="../index.html">Home</a></p>
</footer>

<script src="../js/core.js"></script>
<script>
let RACES, YEAR;

function teamStyle(teamId) {
  const t = DB.teams[teamId]; if (!t) return '';
  const h = t.color; const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);
  return `background:rgba(${r},${g},${b},0.18);color:${h};border-color:rgba(${r},${g},${b},0.4)`;
}

function renderSeason(year) {
  YEAR = year;
  const s = DB.seasons[String(year)];
  if (!s) return;

  // Update URL
  const url = new URL(window.location);
  url.searchParams.set('year', year);
  history.replaceState({}, '', url);

  // Hero
  const isLive = s.status === 'live';
  document.getElementById('hero-eye').textContent = `F1CC ${year} Season ${isLive ? '· 🔴 LIVE' : '· ' + s.status.charAt(0).toUpperCase() + s.status.slice(1)}`;
  document.getElementById('hero-title').textContent = `${year} Community Career`;

  if (s.status === 'complete') {
    const champ = DB.drivers[s.champion_driver];
    const cCon = DB.teams[s.champion_constructor];
    document.getElementById('hero-sub').textContent = `Champion: ${champ ? champ.name : '—'} · Constructor: ${cCon ? cCon.name : '—'}`;
  } else {
    document.getElementById('hero-sub').textContent = 'Season in progress';
  }

  document.getElementById('hero-stats').innerHTML = `
    <div class="hero-stat"><div class="val">${s.rounds}</div><div class="lbl">Races</div></div>
    <div class="hero-stat"><div class="val">${(s.driver_standings||[]).length}</div><div class="lbl">Drivers</div></div>
    <div class="hero-stat"><div class="val">${(s.constructor_standings||[]).length}</div><div class="lbl">Teams</div></div>
  `;

  // Driver standings
  if (s.driver_standings && s.driver_standings.length) {
    const leader = s.driver_standings[0]?.points || 0;
    let html = `<table class="standings-table"><thead><tr>
      <th style="width:40px">Pos</th><th>Driver</th><th>Team</th>
      <th>Wins</th><th>Podiums</th><th>Races</th><th>Points</th><th>Gap</th>
    </tr></thead><tbody>`;
    s.driver_standings.forEach((row, i) => {
      const d = DB.drivers[row.driver];
      const t = DB.teams[row.team];
      const cls = i===0?'p1':i===1?'p2':i===2?'p3':'';
      const gap = row.points === leader ? '—' : '+' + (leader - row.points);
      html += `<tr class="${i===0?'leader':''}">
        <td><div class="pos-badge ${cls}">${row.pos}</div></td>
        <td><div style="display:flex;align-items:center;gap:6px">
          <span>${d?d.flag_emoji:''}</span>
          <a class="driver-name-link" href="driver.html?id=${row.driver}">${d?d.name:row.driver}</a>
        </div></td>
        <td><span class="team-pill" style="${teamStyle(row.team)}">${t?t.short:row.team}</span></td>
        <td>${row.wins??0}</td><td>${row.podiums??0}</td><td>${row.races??0}</td>
        <td class="pts-cell">${row.points}</td>
        <td class="gap-cell">${gap}</td>
      </tr>`;
    });
    html += '</tbody></table>';
    document.getElementById('driver-standings-table').innerHTML = html;
  } else {
    document.getElementById('driver-standings-table').innerHTML = '<p style="color:var(--text-muted);padding:1rem 0">No data yet — check back after the first race.</p>';
  }

  // Constructor standings
  if (s.constructor_standings && s.constructor_standings.length) {
    const leader = s.constructor_standings[0]?.points || 0;
    let html = `<table class="standings-table"><thead><tr>
      <th style="width:40px">Pos</th><th>Constructor</th><th>Points</th><th>Gap</th>
    </tr></thead><tbody>`;
    s.constructor_standings.forEach((row, i) => {
      const t = DB.teams[row.team];
      const tc = t ? t.color : '#3b8de0';
      const r2=parseInt(tc.slice(1,3),16),g2=parseInt(tc.slice(3,5),16),b2=parseInt(tc.slice(5,7),16);
      const gap = row.points === leader ? '—' : '+' + (leader - row.points);
      const cls = i===0?'p1':i===1?'p2':i===2?'p3':'';
      html += `<tr class="${i===0?'leader':''}">
        <td><div class="pos-badge ${cls}">${row.pos}</div></td>
        <td>
          <span class="team-pill" style="background:rgba(${r2},${g2},${b2},0.18);color:${tc};border-color:rgba(${r2},${g2},${b2},0.4)">${t?t.short:row.team}</span>
          &nbsp;<a class="driver-name-link" href="team.html?id=${row.team}">${t?t.name:row.team}</a>
        </td>
        <td class="pts-cell">${row.points}</td>
        <td class="gap-cell">${gap}</td>
      </tr>`;
    });
    html += '</tbody></table>';
    document.getElementById('constructor-standings-table').innerHTML = html;
  } else {
    document.getElementById('constructor-standings-table').innerHTML = '<p style="color:var(--text-muted);padding:1rem 0">No data yet.</p>';
  }

  // Race calendar from races file
  if (RACES && RACES.races) {
    const sorted = [...RACES.races].sort((a,b) => a.round - b.round);
    let html = '';
    sorted.forEach(race => {
      const isComplete = race.status === 'complete';
      const winner = isComplete && race.results && race.results.length > 0
        ? DB.drivers[race.results[0].driver] : null;
      html += `<a class="race-row" href="race.html?id=${race.id}&season=${year}">
        <div class="race-row-round">R${race.round}</div>
        <div class="race-row-flag">${race.flag||'🏁'}</div>
        <div class="race-row-info">
          <div class="race-row-name">${race.name}</div>
          <div class="race-row-circuit">${race.circuit} · ${race.date}</div>
        </div>
        <div class="race-row-winner">
          ${isComplete
            ? `<div style="font-size:10px;color:var(--text-muted)">WINNER</div><div class="win-name">${winner?winner.name:'—'}</div>`
            : `<span class="race-status-badge status-${race.status}">${race.status}</span>`}
        </div>
      </a>`;
    });
    document.getElementById('race-calendar').innerHTML = html || '<p style="color:var(--text-muted)">No races yet.</p>';
  // Re-parse emoji after all dynamic content is set
  setTimeout(() => { if(window.twemoji) twemoji.parse(document.body, {folder:'svg',ext:'.svg'}); }, 50);
  }
}

async function init() {
  DB = await loadDBRoot().catch(() => null);
  if (!DB) { DB = await fetch('../data/db.json').then(r=>r.json()); }

  // Build season selector
  const seasons = Object.keys(DB.seasons).sort((a,b) => b-a);
  const params = new URLSearchParams(window.location.search);
  const requestedYear = parseInt(params.get('year')) || DB.meta.currentSeason;
  YEAR = seasons.includes(String(requestedYear)) ? String(requestedYear) : seasons[0];

  const sel = document.getElementById('season-selector');
  seasons.forEach(y => {
    const btn = document.createElement('button');
    btn.className = 'season-btn' + (y === YEAR ? ' active' : '');
    btn.textContent = y;
    btn.onclick = () => {
      document.querySelectorAll('.season-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      loadRaces(y).then(() => renderSeason(y));
    };
    sel.appendChild(btn);
  });

  await loadRaces(YEAR);
  initTabs();
  renderSeason(YEAR);
}

async function loadRaces(year) {
  try {
    const resp = await fetch(`../data/races_${year}.json`);
    RACES = resp.ok ? await resp.json() : { races: [] };
  } catch { RACES = { races: [] }; }
}

// Fix root-relative fetch for pages/ subdirectory
async function loadDBRoot() {
  const resp = await fetch('../data/db.json');
  DB = await resp.json();
  return DB;
}

init();
// Render flag emojis as images for cross-platform support
// Initial parse handled by renderSeason()
</script>
</body>
</html>
